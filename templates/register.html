{% extends "base.html" %}
{% block title %}Register — BlogGram{% endblock %}
{% block content %}
<section class="auth-section">
  <h1>Join BlogGram</h1>
  <p class="auth-sub">Create your account instantly with Telegram.</p>
  <div class="telegram-login-wrap">
    <script async src="https://telegram.org/js/telegram-widget.js?22"
      data-telegram-login="{{ telegram_bot_username }}"
      data-size="large"
      data-radius="8"
      data-auth-url="/login/telegram/"
      data-request-access="write">
    </script>
  </div>
  <p class="auth-hint">Already have an account? Just sign in — it's the same button.</p>
</section>
{% endblock %}
