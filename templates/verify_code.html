{% extends "base.html" %}
{% block title %}Kodni kiriting — BlogGram{% endblock %}
{% block content %}
<section class="auth-section">
  <h1>Kodni kiriting</h1>
  <p class="auth-sub">{{ phone }} raqamiga Telegram orqali kod yuborildi.</p>
  {% if error %}<p class="auth-error">{{ error }}</p>{% endif %}
  <form method="post" class="auth-form">
    {% csrf_token %}
    <div class="field">
      <label>6 raqamli kod</label>
      <input type="text" name="code" maxlength="6" pattern="[0-9]{6}" placeholder="______" required autofocus autocomplete="one-time-code" class="otp-input">
    </div>
    <button type="submit" class="btn primary">Tasdiqlash</button>
    <p class="auth-hint">Kod kelmadimi? <a href="/login/">Qayta yuborish</a></p>
  </form>
</section>
{% endblock %}
